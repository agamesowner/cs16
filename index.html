<html lang="en-us">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sel-lers/x@main/style.css" />
<style>
  canvas:focus { outline: none; }
  html, body {
    padding: 0; margin: 0; overflow: hidden; height: 100%;
    -webkit-touch-callout: none; user-select: none; -webkit-tap-highlight-color: transparent;
  }
</style>
</head>
<body class="dark">
<div id="unity-container" class="unity-desktop">
<canvas id="unity-canvas" tabindex="-1" width="811" height="647" style="cursor: none;"></canvas>
</div>
<div id="loading-cover" style="background: url('https://cdn.jsdelivr.net/gh/sel-lers/x@main/background.jpg') center/cover; display: none;">
<div id="unity-loading-bar">
<div id="unity-logo"><img src="https://cdn.jsdelivr.net/gh/sel-lers/x@main/logo.png"></div>
<div id="unity-progress-bar-empty"><div id="unity-progress-bar-full" style="width: 100%;"></div></div>
<div class="spinner" style="display: none;"></div>
</div>
</div>
<script>
const buildUrl = "https://cdn.jsdelivr.net/gh/sel-lers/x@main/Build";
const loaderUrl = buildUrl + "/Web GL.loader.js";
const config = {
  dataUrl: buildUrl + "/Web GL.data.unityweb",
  frameworkUrl: buildUrl + "/Web GL.framework.js.unityweb",
  codeUrl: buildUrl + "/Web GL.wasm.unityweb",
  streamingAssetsUrl: "StreamingAssets",
  companyName: "FoXSkr",
  productName: "Contra",
  productVersion: "1.9.4"
};
const container = document.querySelector("#unity-container");
const canvas = document.querySelector("#unity-canvas");
const loadingCover = document.querySelector("#loading-cover");
const progressBarFull = document.querySelector("#unity-progress-bar-full");
const spinner = document.querySelector('.spinner');

let startUnity;
try {
  const script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    startUnity = () => {
      createUnityInstance(canvas, config, (progress) => {
        spinner.style.display = "none";
        progressBarFull.style.width = `${100 * progress}%`;
      }).then(instance => { window.unityInstance = instance; loadingCover.style.display = "none"; });
    };
    startUnity();
  };
  document.body.appendChild(script);
} catch (e) { console.error(e); }

window.addEventListener('pointerdown', () => { window.focus(); canvas.focus(); });
window.addEventListener('touchstart', () => { window.focus(); canvas.focus(); });

// Lock pointer for 360° turn
window.addEventListener('load', () => {
  const gameCanvas = document.querySelector('canvas') || document.body;
  gameCanvas.addEventListener('click', async () => {
    try {
      if (!document.pointerLockElement) {
        await gameCanvas.requestPointerLock({ unadjustedMovement: true });
        console.log("Mouse locked");
      }
    } catch {
      gameCanvas.requestPointerLock();
    }
  });
});
</script>
<!-- Ad Block -->
<div id="ad-container" style="display: block; position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: calc(100% - 20px); max-width: 728px; height: 90px; background: rgba(0,0,0,0.9); z-index:99999; border-radius:0; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.45); transition: transform 0.5s ease-in-out;">
<iframe id="ad-iframe" src="https://script.google.com/macros/s/AKfycbzA6GNdpfUShkCh6apD0D21YAUf7A5d3Guhq2PayqLbk_5XG_wQhy0bdYzKJWLhzgMVMQ" width="768" height="95" scrolling="no" frameborder="0" sandbox="allow-scripts allow-popups allow-same-origin"></iframe>
<button id="close-ad" class="enabled" style="position:absolute; top:6px; right:8px; background:#ff4d4d; border:none; padding:5px 9px; font-size:13px; border-radius:4px; cursor:pointer; opacity:0.72; z-index:100000;">Close ↑</button>
<div id="ad-right-mask" style="position:absolute; top:0; right:0; width:12px; height:100%; background:linear-gradient(to right, rgba(0,0,0,0), rgba(0,0,0,0.9));"></div>
</div>
<script>
(function() {
  const showDelay=2000, countdown=12, reappear=25000;
  const adContainer=document.getElementById('ad-container');
  const closeBtn=document.getElementById('close-ad');

  function showAd() {
    adContainer.style.display='block'; adContainer.classList.remove('hidden');
    let t=countdown, interval=setInterval(()=>{
      t--; closeBtn.textContent=`Close (${t})`;
      if(t<=0){ clearInterval(interval); closeBtn.disabled=false; closeBtn.classList.add('enabled'); closeBtn.textContent='Close ↑'; }
    }, 1000);
  }

  setTimeout(showAd, showDelay);
  closeBtn.addEventListener('click', () => {
    adContainer.classList.add('hidden');
    setTimeout(showAd, reappear);
  });
})();
</script>
</body>
</html>
